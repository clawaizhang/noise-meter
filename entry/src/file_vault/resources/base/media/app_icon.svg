<?xml version="1.0" encoding="UTF-8"?>
<svg width="216px" height="216px" viewBox="0 0 216 216" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <title>小蓝书图标</title>
    <defs>
        <linearGradient x1="50%" y1="0%" x2="50%" y2="100%" id="linearGradient">
            <stop stop-color="#4A90E2" offset="0%"></stop>
            <stop stop-color="#2196F3" offset="100%"></stop>
        </linearGradient>
    </defs>
    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <!-- 背景 -->
        <rect fill="url(#linearGradient)" x="0" y="0" width="216" height="216"></rect>
        
        <!-- 保险箱主体 -->
        <rect fill="#FFFFFF" x="36" y="45" width="144" height="126" rx="8"></rect>
        
        <!-- 保险箱门把手 -->
        <circle fill="#2196F3" cx="153" cy="108" r="14"></circle>
        <circle fill="#FFFFFF" cx="153" cy="108" r="7"></circle>
        
        <!-- 数字键盘示意 -->
        <rect fill="#2196F3" x="63" y="72" width="63" height="9" rx="4.5"></rect>
        <rect fill="#2196F3" x="63" y="90" width="63" height="9" rx="4.5"></rect>
        <rect fill="#2196F3" x="63" y="108" width="63" height="9" rx="4.5"></rect>
        <rect fill="#2196F3" x="63" y="126" width="63" height="9" rx="4.5"></rect>
    </g>
</svg> 
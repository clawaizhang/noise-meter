<svg width="24px" height="24px" viewBox="0 0 24 24" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <g stroke="none" fill="none">
    <!-- 仪表盘 -->
    <g transform="translate(12, 12)" stroke="currentColor" stroke-width="1.5">
      <!-- 仪表盘轮廓 -->

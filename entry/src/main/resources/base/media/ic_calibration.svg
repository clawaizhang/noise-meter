      <!-- 刻度线 -->
      <line x1="0" y1="-9" x2="0" y2="-7" stroke-linecap="round"/>
      <line x1="6.364" y1="-6.364" x2="5.657" y2="-5.657" stroke-linecap="round"/>
      <line x1="9" y1="0" x2="7" y2="0" stroke-linecap="round"/>
      <line x1="6.364" y1="6.364" x2="5.657" y2="5.657" stroke-linecap="round"/>
      <line x1="0" y1="9" x2="0" y2="7" stroke-linecap="round"/>
      <line x1="-6.364" y1="6.364" x2="-5.657" y2="5.657" stroke-linecap="round"/>
      <line x1="-9" y1="0" x2="-7" y2="0" stroke-linecap="round"/>
      <line x1="-6.364" y1="-6.364" x2="-5.657" y2="-5.657" stroke-linecap="round"/>
      <!-- 指针 -->
      <line x1="0" y1="0" x2="0" y2="-6" stroke-linecap="round"/>

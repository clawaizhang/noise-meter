<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024px" height="1024px" viewBox="0 0 108 108" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 主渐变背景 -->
                <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#64B5F6"/>
                    <stop offset="100%" style="stop-color:#1E88E5"/>
                </linearGradient>
        <!-- 波纹渐变 -->
        <linearGradient id="waveGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9"/>
            <stop offset="100%" style="stop-color:#E3F2FD;stop-opacity:0.3"/>
        </linearGradient>
    </defs>

    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <!-- 正方形背景 -->
                <rect x="0" y="0" width="100%" height="100%" fill="url(#bgGradient)"/>

        <!-- 动态声波图形 -->
        <g transform="translate(20, 40)">
            <!-- 中央声波组 -->
            <path d="M35,25 Q40,25 40,0 Q40,-25 35,-25 Q30,-25 30,0 Q30,25 35,25"
                  fill="url(#waveGradient)" opacity="0.9"/>

            <!-- 左侧声波组 -->
            <path d="M20,20 Q25,20 25,0 Q25,-20 20,-20 Q15,-20 15,0 Q15,20 20,20"
                  fill="url(#waveGradient)" opacity="0.7"/>

            <!-- 右侧声波组 -->
            <path d="M50,20 Q55,20 55,0 Q55,-20 50,-20 Q45,-20 45,0 Q45,20 50,20"
                  fill="url(#waveGradient)" opacity="0.7"/>

            <!-- 最外层声波 -->
            <path d="M5,15 Q10,15 10,0 Q10,-15 5,-15 Q0,-15 0,0 Q0,15 5,15"
                  fill="url(#waveGradient)" opacity="0.5"/>
            <path d="M65,15 Q70,15 70,0 Q70,-15 65,-15 Q60,-15 60,0 Q60,15 65,15"
                  fill="url(#waveGradient)" opacity="0.5"/>
        </g>

        <!-- 分贝计刻度 -->
        <g transform="translate(54,68)" stroke="#FFFFFF">
            <!-- 刻度线 -->
            <line x1="-30" y1="0" x2="-25" y2="0" stroke-width="2" opacity="0.7"/>
            <line x1="25" y1="0" x2="30" y2="0" stroke-width="2" opacity="0.7"/>
            <line x1="0" y1="-30" x2="0" y2="-25" stroke-width="2" opacity="0.7"/>
            <line x1="0" y1="25" x2="0" y2="30" stroke-width="2" opacity="0.7"/>
        </g>

        <!-- dB文字 -->
        <text x="42" y="86" font-family="HarmonyOS Sans" font-size="18" fill="#FFFFFF" style="font-weight: bold;">dB</text>
    </g>
</svg>

<svg width="24px" height="24px" viewBox="0 0 24 24" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <g stroke="none" fill="none">
        <!-- 动态声波图形 -->
        <g transform="translate(4, 12)" fill="currentColor">
            <!-- 从左到右均匀分布的五个声波 -->
            <!-- 最左声波 -->
            <path d="M0,3 Q1,3 1,0 Q1,-3 0,-3 Q-1,-3 -1,0 Q-1,3 0,3"/>

            <!-- 左声波 -->
            <path d="M4,4 Q5,4 5,0 Q5,-4 4,-4 Q3,-4 3,0 Q3,4 4,4"/>

            <!-- 中央声波 -->
            <path d="M8,6 Q9,6 9,0 Q9,-6 8,-6 Q7,-6 7,0 Q7,6 8,6"/>

            <!-- 右声波 -->
            <path d="M12,4 Q13,4 13,0 Q13,-4 12,-4 Q11,-4 11,0 Q11,4 12,4"/>

            <!-- 最右声波 -->
            <path d="M16,3 Q17,3 17,0 Q17,-3 16,-3 Q15,-3 15,0 Q15,3 16,3"/>
        </g>

